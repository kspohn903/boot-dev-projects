name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  # The original test job
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./...

  # The new parallel style job
  style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Check Formatting
        run: |
          # This checks if go fmt would change any files
          test -z "$(go fmt ./...)"
